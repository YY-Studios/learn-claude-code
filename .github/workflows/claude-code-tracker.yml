name: Claude Code Update Tracker

on:
  schedule:
    - cron: '0 9 */2 * *'
  workflow_dispatch:

jobs:
  check-updates:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Fetch Claude Code releases
        run: |
          curl -s \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/anthropics/claude-code/releases?per_page=5" \
            > /tmp/releases.json

          echo "저장 완료: $(jq -r '.[0].tag_name' /tmp/releases.json)"

      - name: Check latest version
        id: check_version
        run: |
          LATEST_TAG=$(jq -r '.[0].tag_name // "unknown"' /tmp/releases.json)
          LATEST_DATE=$(jq -r '.[0].published_at // ""' /tmp/releases.json)

          jq -r '.[0].body // ""' /tmp/releases.json > /tmp/release_body.txt

          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "latest_date=$LATEST_DATE" >> $GITHUB_OUTPUT
          echo "감지된 버전: $LATEST_TAG"

      - name: Check for duplicate issue
        id: check_duplicate
        run: |
          LATEST_TAG="${{ steps.check_version.outputs.latest_tag }}"

          EXISTING=$(curl -s \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/issues?state=all&labels=claude-code-update&per_page=50" \
            | jq -r --arg tag "$LATEST_TAG" '[.[] | select(.title | contains($tag))] | length')

          if [ "$EXISTING" -gt "0" ]; then
            echo "duplicate=true" >> $GITHUB_OUTPUT
            echo "⏭️ $LATEST_TAG 이슈가 이미 존재합니다. 스킵합니다."
          else
            echo "duplicate=false" >> $GITHUB_OUTPUT
            echo "✅ 새로운 버전 $LATEST_TAG 감지. 분석을 진행합니다."
          fi

      - name: Analyze with GPT-4o
        id: analyze
        if: steps.check_duplicate.outputs.duplicate == 'false'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LATEST_TAG: ${{ steps.check_version.outputs.latest_tag }}
        run: |
          python3 << 'PYEOF'
          import json, os

          tag = os.environ.get("LATEST_TAG", "")
          with open("/tmp/release_body.txt", "r") as f:
              body = f.read()

          prompt = {
              "model": "gpt-4o",
              "max_tokens": 1500,
              "messages": [
                  {
                      "role": "system",
                      "content": "당신은 Claude Code 업데이트를 분석하는 전문가입니다. 반드시 순수 JSON만 반환하고 마크다운 코드블록이나 설명 텍스트는 절대 포함하지 마세요."
                  },
                  {
                      "role": "user",
                      "content": f"다음은 Claude Code {tag} 릴리즈 노트입니다.\n\n{body}\n\n---\n판단 기준:\n- 새 버전 릴리즈: 항상 true\n- Breaking change: 기존 명령어·API·설정 방식이 바뀐 경우\n- 새 기능 추가: 새로운 명령어, 옵션, 통합 기능\n- 보안 관련: CVE, 취약점 수정\n\nJSON만 반환: {{\"should_create_issue\": true, \"categories\": [], \"summary\": \"3줄 이내 한국어 요약\", \"breaking_changes\": null, \"new_features\": [], \"security\": null, \"action_required\": null}}"
                  }
              ]
          }

          with open("/tmp/prompt_final.json", "w") as f:
              json.dump(prompt, f, ensure_ascii=False)

          print("프롬프트 생성 완료")
          PYEOF

          RESPONSE=$(curl -s https://api.openai.com/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -d @/tmp/prompt_final.json)

          echo "=== API 응답 ==="
          echo "$RESPONSE"

          # content를 파일로 저장 (bash 변수 경유하면 특수문자 깨짐 방지)
          echo "$RESPONSE" | jq -r '.choices[0].message.content' > /tmp/analysis.json

          # 혹시 코드블록으로 감싸져 있으면 제거
          sed -i 's/^```json//;s/^```//' /tmp/analysis.json

          # output으로 전달
          echo "analysis<<EOF" >> $GITHUB_OUTPUT
          cat /tmp/analysis.json >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          # jq로 파일에서 직접 읽기 (bash 변수 파싱 문제 완전 회피)
          SHOULD_CREATE=$(jq -r '.should_create_issue // true' /tmp/analysis.json)
          echo "should_create=$SHOULD_CREATE" >> $GITHUB_OUTPUT

      - name: Create GitHub Issue
        if: |
          steps.check_duplicate.outputs.duplicate == 'false' &&
          steps.analyze.outputs.should_create == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST_TAG="${{ steps.check_version.outputs.latest_tag }}"
          LATEST_DATE="${{ steps.check_version.outputs.latest_date }}"
          RELEASE_DATE=$(echo "$LATEST_DATE" | cut -c1-10)

          # analysis도 파일에서 직접 읽기
          SUMMARY=$(jq -r '.summary // "분석 결과 없음"' /tmp/analysis.json)
          BREAKING=$(jq -r '.breaking_changes // "없음"' /tmp/analysis.json)
          FEATURES=$(jq -r '.new_features // [] | if type == "array" and length > 0 then map("- " + .) | join("\n") else "없음" end' /tmp/analysis.json)
          SECURITY=$(jq -r '.security // "없음"' /tmp/analysis.json)
          ACTION=$(jq -r '.action_required // "없음"' /tmp/analysis.json)
          CATEGORIES=$(jq -r '.categories // [] | join(", ")' /tmp/analysis.json)

          cat > /tmp/issue_body.md << ISSUEBODY
          ## 📦 Claude Code ${LATEST_TAG} 업데이트

          릴리즈 날짜: ${RELEASE_DATE} | 카테고리: ${CATEGORIES}

          ### 요약
          ${SUMMARY}

          ### ⚠️ Breaking Changes
          ${BREAKING}

          ### ✨ 새로운 기능
          ${FEATURES}

          ### 🔒 보안
          ${SECURITY}

          ### 🚀 필요한 액션
          ${ACTION}

          ---
          공식 릴리즈 노트: https://github.com/anthropics/claude-code/releases/tag/${LATEST_TAG}
          이 이슈는 GitHub Actions가 자동 생성했습니다.
          ISSUEBODY

          gh issue create \
            --repo "${{ github.repository }}" \
            --title "🤖 Claude Code ${LATEST_TAG} 업데이트 알림" \
            --body-file /tmp/issue_body.md \
            --label "claude-code-update"

      - name: Skip log
        if: |
          steps.check_duplicate.outputs.duplicate == 'false' &&
          steps.analyze.outputs.should_create == 'false'
        run: |
          echo "💤 GPT-4o 판단: 이번 업데이트는 이슈 생성 기준에 해당하지 않습니다."
          echo "버전: ${{ steps.check_version.outputs.latest_tag }}"